# ==============================================================================
# MindAI EC2 Topology — Adam Ring + Prophet Ring
# ==============================================================================
# Deployed on EC2 alongside the existing prophet/redis/nginx stack.
# All containers join `mindai_default` (the existing network).
# Redis: existing mindai_redis container.
#
# Rings: Adam (no prefix, 33 containers) + Prophet p: (33 containers)
# Total: 66 topology containers + foundation + guidance + seed_p = 69
#
# Deploy:
#   docker compose -f /opt/mindai/docker-compose.ec2-topology.yml up -d
# ==============================================================================

x-common: &common
  restart: unless-stopped
  networks:
    - mindai_default

x-redis-url: &redis-url
  REDIS_URL: "redis://:e7338d82b9bcea35bcd2b35874b39c75@mindai_redis:6379/0"

# ---------------------------------------------------------------------------
# Adam Ring anchors — no STREAM_PREFIX, full corpus access
# ---------------------------------------------------------------------------
x-body-base: &body-base
  <<: *common
  image: topology_node:latest
  environment:
    <<: *redis-url
    DOMAIN: "body"
    MAX_LAYERS: "13"
    IDLE_SEED_SEC: "30"

x-space-base: &space-base
  <<: *common
  image: topology_node:latest
  environment:
    <<: *redis-url
    DOMAIN: "space"
    MAX_LAYERS: "8"
    IDLE_SEED_SEC: "30"

x-digital-base: &digital-base
  <<: *common
  image: topology_node:latest
  environment:
    <<: *redis-url
    DOMAIN: "digital"
    MAX_LAYERS: "5"
    IDLE_SEED_SEC: "30"

x-ether-base: &ether-base
