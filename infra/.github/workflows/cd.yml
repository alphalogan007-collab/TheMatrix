name: CD — Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

# Prevent concurrent deploys — queue them instead of running in parallel
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build backend image and push to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Run DB migrations via SSH before swapping containers
  # ────────────────────────────────────────────────────────────────────────────
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build-backend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Run Alembic migrations over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/mindai
            # Pull only the backend image, run migration as a one-off container
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="${DATABASE_URL}" \
              backend \
              alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  # ────────────────────────────────────────────────────────────────────────────
  # 3. SSH to Hetzner, pull new images, rolling restart
  # ────────────────────────────────────────────────────────────────────────────
  deploy-to-hetzner:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: run-migrations
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/mindai

            echo "=== Pulling latest images ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Restarting backend (zero-downtime) ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans backend

            echo "=== Reloading Caddy config ==="
            docker compose -f docker-compose.prod.yml exec -T caddy caddy reload \
              --config /etc/caddy/Caddyfile --adapter caddyfile || true

            echo "=== Pruning old images ==="
            docker image prune -f --filter "until=24h"

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Health check — fail the workflow if backend isn't responding
  # ────────────────────────────────────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy-to-hetzner
    environment: production
    steps:
      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend health endpoint..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.PROD_DOMAIN }}/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Backend failed health check after 2 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/mindai
            echo "Health check failed — rolling back to previous image"
            docker compose -f docker-compose.prod.yml rollback backend 2>/dev/null || \
              docker compose -f docker-compose.prod.yml up -d --no-deps backend
