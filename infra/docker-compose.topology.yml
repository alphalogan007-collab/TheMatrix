#
# Architecture:
#   seed (entry point) Ã¢â€ â€™ body layers 1-13 Ã¢â€ â€™ space layers 1-8 Ã¢â€ â€™ ... Ã¢â€ â€™ unity
#   All input (text / video / audio) flows through the body first.
