  image: topology_node:latest
  environment:
    <<: *redis-url
    DOMAIN: "unity"
    MAX_LAYERS: "1"
    IDLE_SEED_SEC: "30"

# ---------------------------------------------------------------------------
# Prophet Ring anchors — STREAM_PREFIX=p:, wisdom-only corpus
# ---------------------------------------------------------------------------
x-p-body-base: &p-body-base
