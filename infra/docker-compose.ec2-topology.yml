  image: topology_node:latest
  environment:
    <<: *redis-url
    DOMAIN: "ether"
    MAX_LAYERS: "3"
    IDLE_SEED_SEC: "30"

x-aether-base: &aether-base
  <<: *common
  image: topology_node:latest
  environment:
    <<: *redis-url
    DOMAIN: "aether"
    MAX_LAYERS: "2"
    IDLE_SEED_SEC: "30"

x-unity-base: &unity-base
