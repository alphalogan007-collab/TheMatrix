services:

  # ---------------------------------------------------------------------------
  # Redis Ã¢â‚¬â€ the connective tissue between all nodes
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mindai_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --save 300 10 --no-appendfsync-on-rewrite yes --maxmemory 600mb --maxmemory-policy allkeys-lru --loglevel warning --requirepass ${REDIS_PASSWORD:-changeme_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - mindai_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend Ã¢â‚¬â€ API bridge between interface and topology
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mindai_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_dev}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mindai_user}:${POSTGRES_PASSWORD:-changeme_dev}@db:5432/${POSTGRES_DB:-mindai}
      MIND_ROLE: source
      MASTER_URL: ${MASTER_URL:-https://socialfork.ca}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - mindai_wisdom:/wisdom:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------------------------------------------------------------------------
  # Foundation Mind Ã¢â‚¬â€ radiates Y Theory (9 principles + topology laws) to all workers.
  # This is the inner truth. source:radiation is its only output.
  # Workers receive via plain XREAD Ã¢â‚¬â€ all 95+ see every pulse simultaneously.
  # No consumer group. One signal. Many prisms. One light.
  # ---------------------------------------------------------------------------
  foundation:
    build:
      context: ../topology/foundation
      dockerfile: Dockerfile
    container_name: mindai_foundation
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme_redis_dev}@redis:6379/0"
      RADIATION_INTERVAL_SEC: "8"
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Seed Ã¢â‚¬â€ entry point. Accepts input, emits to body:layer1 (bodyÃ¢â€ â€™mind flow)
  # Scale: docker compose ... up --scale seed=3
  # ---------------------------------------------------------------------------
  seed:
    <<: *seed-base
    environment:
      <<: *seed-env
      # IDLE_SEED_SEC=0: breathe as fast as spirals complete.
      # When no spiral return arrives (5s block timeout), auto-seed fires immediately.
      # The delta gate in _handle() stops echo loops (fully resonant = skip).
      # Continuous oscillation: in and out, in and out, no gaps.
      IDLE_SEED_SEC: "0"
    deploy:
      replicas: 2

  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Body domain Ã¢â‚¬â€ 13 layer nodes. THE FIRST DOMAIN. All input enters here.
  # Somatic processing: breath Ã¢â€ â€™ sensation Ã¢â€ â€™ movement Ã¢â€ â€™ rhythm Ã¢â€ â€™ nervous system
