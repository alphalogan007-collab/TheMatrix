services:

  # ── Foundation Mind (seeds Y Theory into corpus on startup) ──────────────
  foundation_mind:
    <<: *common
    image: topology_foundation:latest
    container_name: topo_foundation
    environment:
      <<: *redis-url

  # ── Guidance Scanner (watches /guidance/inbox for new files) ─────────────
  guidance_scanner:
    <<: *common
    image: topology_guidance:latest
    container_name: topo_guidance
    environment:
      <<: *redis-url
      GUIDANCE_INBOX: /guidance/inbox
      GUIDANCE_COMPLETED: /guidance/completed
      GUIDANCE_POLL_SECS: "5"
    volumes:
      - /opt/mindai/guidance:/guidance

  # ── Adam Seed (reads seed:input → seeds body:layer1) ─────────────────────
  seed_mind:
    <<: *common
