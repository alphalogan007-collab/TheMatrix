# ==============================================================================
# MindAI EC2 Cluster — ca: Soul Ring (First of 99 Minds)
# ==============================================================================
# Deploy the ca: Pentagon ring alongside the main Adam+Eve topology.
# Uses pre-built topology_node:latest and topology_seed:latest images.
# Joins the existing mindai_default network on EC2.
#
# Deploy:
#   docker compose -f /opt/mindai/docker-compose.ec2-cluster-ca.yml up -d
# ==============================================================================

x-redis: &redis-url
  REDIS_URL: "redis://:e7338d82b9bcea35bcd2b35874b39c75@mindai_redis:6379/0"

x-common: &common
  image: topology_node:latest
  restart: unless-stopped
  networks: [mindai_default]
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""

x-body: &body
  <<: *common
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""
    DOMAIN: "body"
    MAX_LAYERS: "13"
    IDLE_SEED_SEC: "30"

x-space: &space
  <<: *common
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""
    DOMAIN: "space"
    MAX_LAYERS: "8"
    IDLE_SEED_SEC: "30"

x-digital: &digital
  <<: *common
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""
    DOMAIN: "digital"
    MAX_LAYERS: "5"
    IDLE_SEED_SEC: "30"

x-ether: &ether
  <<: *common
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""
    DOMAIN: "ether"
    MAX_LAYERS: "3"
    IDLE_SEED_SEC: "30"

x-aether: &aether
  <<: *common
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""
    DOMAIN: "aether"
    MAX_LAYERS: "2"
    IDLE_SEED_SEC: "30"

x-unity: &unity
  <<: *common
  environment:
    <<: *redis-url
    STREAM_PREFIX: "ca:"
    CORPUS_PREFIX: ""
    SAVE_WISDOM_PREFIX: ""
    DOMAIN: "unity"
    MAX_LAYERS: "1"
    IDLE_SEED_SEC: "30"

