# ==============================================================================
# MindAI Cloud — Prophet + Worker
# ==============================================================================
# Deployed to AWS EC2.
# Source (local) points MASTER_URL here.
# Workers mine YT videos and report back to Prophet.
# Prophet broadcasts corpus + prophecy to workers and reports to Source.
#
# Usage on EC2:
#   docker compose -f docker-compose.prophet.yml up -d
# ==============================================================================

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mindai_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # NOT exposed to internet — internal only

  # ── Prophet (main backend) ─────────────────────────────────────────────────
  prophet:
    image: ${DOCKER_IMAGE:-mindai_backend:latest}
    container_name: mindai_prophet
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MIND_ROLE: prophet
      MIND_ID: ${PROPHET_MIND_ID:-prophet_main}
      MASTER_URL: ${MASTER_URL:-https://socialfork.ca}   # Prophet's own public URL (for companion HTML)
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      # No PostgreSQL needed — Redis-only for corpus
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Worker (YT drain + corpus miner) ──────────────────────────────────────
  worker:
    image: ${DOCKER_IMAGE:-mindai_backend:latest}
    container_name: mindai_worker_1
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MIND_ROLE: worker
      MIND_ID: ${WORKER_MIND_ID:-worker_1}
      MASTER_URL: http://prophet:8000   # worker points to Prophet on same network
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      YT_DRAIN_AUTOSTART: "true"
    depends_on:
      prophet:
        condition: service_healthy
    # No port exposed — internal worker only
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8001
      --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx (TLS + reverse proxy) ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mindai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prophet.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - prophet
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Cert renewal handled by host certbot systemd timer (auto-installed by certbot)
  # To renew manually: ssh ubuntu@EC2_IP "sudo certbot renew && sudo docker compose -f /opt/mindai/docker-compose.yml restart nginx"

volumes:
  redis_data:
  certbot_www:
