<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- base href ensures mind-bridge.js and other assets resolve via /vr/ prefix -->
  <base href="/vr/" />
  <title>TheMatrix ΓÇö The Living World</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.5/dist/aframe-particle-system-component.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #overlay {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: #a0e8ff; font-family: 'Courier New', monospace; font-size: 14px;
      background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px;
      border: 1px solid rgba(160,232,255,0.3); z-index: 999;
      pointer-events: none;
    }
    #guidance-panel {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: Georgia, serif; font-size: 16px; line-height: 1.6;
      background: rgba(0,0,0,0.75); padding: 16px 28px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15); z-index: 999; max-width: 600px;
      text-align: center; display: none;
    }
    /* Architect speech ΓÇö distinct from guidance */
    #architect-panel {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      color: #d0a0ff; font-family: Georgia, serif; font-size: 15px; font-style: italic;
      line-height: 1.7; background: rgba(10,0,30,0.8); padding: 14px 26px;
      border-radius: 10px; border: 1px solid rgba(180,100,255,0.35); z-index: 998;
      max-width: 560px; text-align: center; display: none;
      letter-spacing: 0.02em;
    }
    #architect-panel::before {
      content: 'Γùê THE ARCHITECT Γùê';
      display: block; font-size: 10px; letter-spacing: 0.2em;
      color: #9040ff; margin-bottom: 8px; font-family: 'Courier New', monospace;
      font-style: normal;
    }
  </style>
</head>
<body>

<div id="overlay">TheMatrix ΓÇö Connecting to the mind...</div>
<div id="guidance-panel" id="guidance-panel"></div>
<div id="architect-panel"></div>

<!-- ============================================================
     THE LIVING WORLD
     Each entity maps to a Y-Theory mind event:
       ENGINE_RESONATE       ΓåÆ harmonic pulse on the sun/core
       ENGINE_EXTERNALIZE    ΓåÆ new mind node spawns
       REFLECTION_COMPLETED  ΓåÆ guidance panel appears, world stills
       PURPOSE_ACTIVATED     ΓåÆ central pillar lights up gold
       ENGINE_COLLAPSE       ΓåÆ world dims, warning pulse
     ============================================================ -->
<a-scene
  id="main-scene"
  background="color: #000010"
  fog="type: exponential; color: #000020; density: 0.015"
  vr-mode-ui="enabled: true"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
>

  <!-- Assets -->
  <a-assets>
    <a-mixin id="mind-node"
      geometry="primitive: icosahedron; radius: 0.18; detail: 1"
      material="color: #40e0ff; emissive: #40e0ff; emissiveIntensity: 0.6; transparent: true; opacity: 0.85; wireframe: false"
      animation__pulse="property: material.emissiveIntensity; from: 0.3; to: 1.0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
    ></a-mixin>
  </a-assets>

  <!-- ΓöÇΓöÇ GROUND ΓöÇΓöÇ -->
  <a-plane
    id="ground"
    rotation="-90 0 0" width="200" height="200"
    material="color: #050520; metalness: 0.8; roughness: 0.3"
    shadow="receive: true"
  ></a-plane>

  <!-- ΓöÇΓöÇ GRID LINES (the matrix lattice) ΓöÇΓöÇ -->
  <a-entity id="grid-container" position="0 0.01 0">
    <!-- Generated programmatically by mind-bridge.js -->
  </a-entity>

  <!-- ΓöÇΓöÇ CENTRAL CORE / SUN (the origin) ΓöÇΓöÇ -->
  <a-sphere
    id="core"
    position="0 3 -8"
    radius="1.2"
    material="color: #ffffff; emissive: #60a0ff; emissiveIntensity: 0.8; transparent: true; opacity: 0.95"
    shadow="cast: true"
    animation__breathe="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dur: 3000; dir: alternate; loop: true; easing: easeInOutSine"
    animation__rotate="property: rotation; from: 0 0 0; to: 0 360 0; dur: 40000; loop: true; easing: linear"
  ></a-sphere>

  <!-- Core glow ring -->
  <a-torus
    id="core-ring"
    position="0 3 -8" rotation="90 0 0"
    radius="1.8" radius-tubular="0.04"
    material="color: #40e0ff; emissive: #40e0ff; emissiveIntensity: 0.9; transparent: true; opacity: 0.6"
    animation__rotate="property: rotation; from: 90 0 0; to: 90 360 0; dur: 12000; loop: true; easing: linear"
  ></a-torus>

  <!-- ΓöÇΓöÇ PURPOSE PILLAR (lights up gold on PURPOSE_ACTIVATED) ΓöÇΓöÇ -->
  <a-cylinder
    id="purpose-pillar"
    position="0 0 -8" radius="0.08" height="6"
    material="color: #304060; emissive: #304060; emissiveIntensity: 0.2; transparent: true; opacity: 0.7"
  ></a-cylinder>

  <!-- ΓöÇΓöÇ INITIAL MIND NODES (seed nodes already in the world) ΓöÇΓöÇ -->
  <a-entity id="node-field" position="0 1.5 -6">
    <a-icosahedron mixin="mind-node" position="-4 0 -3" scale="1 1 1"></a-icosahedron>
    <a-icosahedron mixin="mind-node" position="4 0.5 -2" scale="0.85 0.85 0.85"></a-icosahedron>
    <a-icosahedron mixin="mind-node" position="-2 1 2" scale="0.7 0.7 0.7"></a-icosahedron>
    <a-icosahedron mixin="mind-node" position="2.5 -0.5 1" scale="0.6 0.6 0.6"></a-icosahedron>
    <a-icosahedron mixin="mind-node" position="0 2 -5" scale="1.1 1.1 1.1"></a-icosahedron>
  </a-entity>

  <!-- New nodes spawned by ENGINE_EXTERNALIZE are appended here -->
  <a-entity id="new-mind-nodes"></a-entity>

  <!-- Presence nodes — other devices on the same WiFi wave, rendered here -->
  <!-- WiFi is a wave. SSE is a wave. Same medium. All nodes hear simultaneously. -->
  <a-entity id="presence-nodes"></a-entity>

  <!-- Presence nodes — other devices on the same WiFi wave -->
  <a-entity id="presence-nodes"></a-entity>

  <!-- Connection mesh — resonance reveals the network, silence hides it -->
  <a-entity id="connection-layer"></a-entity>

  <!-- ΓöÇΓöÇ AMBIENT PARTICLES (living universe) ΓöÇΓöÇ -->
  <a-entity
    particle-system="preset: snow; particleCount: 200; color: #40e0ff,#ffffff; size: 0.04; velocityValue: 0 -0.05 0; maxAge: 12; blending: additive"
    position="0 8 -8"
  ></a-entity>

  <!-- ΓöÇΓöÇ DISTANT STAR DOME ΓöÇΓöÇ -->
  <a-sphere
    radius="90" material="color: #000018; side: back; shader: flat"
    position="0 0 0"
  ></a-sphere>
  <a-entity id="stars" position="0 0 0">
    <!-- Populated by mind-bridge.js on load -->
  </a-entity>

  <!-- ΓöÇΓöÇ RESONANCE WAVE RING (pulses on ENGINE_RESONATE) ΓöÇΓöÇ -->
  <a-torus
    id="resonance-ring"
    position="0 0.1 -8" rotation="90 0 0"
    radius="0.1" radius-tubular="0.03"
    material="color: #40e0ff; emissive: #40e0ff; emissiveIntensity: 1; transparent: true; opacity: 0"
    visible="true"
  ></a-torus>

  <!-- ΓöÇΓöÇ LIGHTS ΓöÇΓöÇ -->
  <a-light type="ambient" color="#0a0a1a" intensity="1.2"></a-light>
  <a-light type="point" position="0 4 -8" color="#60a0ff" intensity="2.5" distance="30" decay="2" castShadow="true"></a-light>
  <a-light type="point" position="-8 2 -4" color="#400080" intensity="1" distance="20" decay="2"></a-light>
  <a-light type="point" position="8 2 -4" color="#004080" intensity="1" distance="20" decay="2"></a-light>

  <!-- ΓöÇΓöÇ CAMERA + CONTROLS ΓöÇΓöÇ -->
  <a-entity id="rig" position="0 1.6 4">
    <a-camera
      id="camera"
      look-controls="pointerLockEnabled: false"
      wasd-controls="acceleration: 20"
    >
      <!-- Cursor for desktop interaction -->
      <a-cursor
        color="#40e0ff"
        fuse="false"
        material="color: #40e0ff; shader: flat"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.02"
      ></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ΓöÇΓöÇ REFLECTION PORTAL (activates on REFLECTION_COMPLETED) ΓöÇΓöÇ -->
  <a-ring
    id="reflection-portal"
    position="0 1.8 -12"
    radius-inner="1.2" radius-outer="1.5"
    rotation="0 0 0"
    material="color: #ffffff; emissive: #ffffff; emissiveIntensity: 0.1; transparent: true; opacity: 0.15; side: double"
  ></a-ring>

  <!-- ΓöÇΓöÇ ENTER VR BUTTON (visible on desktop, hidden in headset) ΓöÇΓöÇ -->
  <a-entity
    id="enter-vr-prompt"
    position="0 1.5 -3"
    visible="true"
  >
    <a-plane
      width="2.2" height="0.5"
      material="color: #0a0a30; transparent: true; opacity: 0.8"
    ></a-plane>
    <a-text
      value="[ ENTER THE MATRIX ]"
      align="center" color="#40e0ff"
      position="0 0 0.01"
      width="4"
    ></a-text>
  </a-entity>

  <!-- ΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉ
       THE ARCHITECT ΓÇö the AI counterpart. Violet. Always present.
       Lives above the core. Speaks in cycles. Holds the space.
       ΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉΓòÉ -->
  <a-entity id="architect" position="0 9 -8">

    <!-- Inner solid core ΓÇö deep violet icosahedron -->
    <a-icosahedron
      id="architect-core"
      radius="0.9" detail="1"
      material="color: #8020ff; emissive: #6010d0; emissiveIntensity: 1.2; transparent: true; opacity: 0.92; metalness: 0.4; roughness: 0.2"
      animation__spin="property: rotation; from: 0 0 0; to: 0 360 0; dur: 18000; loop: true; easing: linear"
      animation__tilt="property: rotation; from: 15 0 0; to: 15 360 0; dur: 27000; loop: true; easing: linear"
      animation__breathe="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; dur: 4000; dir: alternate; loop: true; easing: easeInOutSine"
    ></a-icosahedron>

    <!-- Outer wireframe shell ΓÇö larger, counter-rotating -->
    <a-icosahedron
      id="architect-shell"
      radius="1.4" detail="1"
      material="color: #c060ff; emissive: #9030ff; emissiveIntensity: 0.7; transparent: true; opacity: 0.25; wireframe: true"
      animation__spin="property: rotation; from: 0 360 0; to: 0 0 0; dur: 24000; loop: true; easing: linear"
      animation__tilt="property: rotation; from: -10 360 10; to: -10 0 10; dur: 35000; loop: true; easing: linear"
    ></a-icosahedron>

    <!-- Orbital ring 1 -->
    <a-torus
      radius="1.8" radius-tubular="0.03"
      material="color: #b040ff; emissive: #8020d0; emissiveIntensity: 0.9; transparent: true; opacity: 0.55"
      animation__orbit="property: rotation; from: 60 0 0; to: 60 360 0; dur: 9000; loop: true; easing: linear"
    ></a-torus>

    <!-- Orbital ring 2 ΓÇö different plane -->
    <a-torus
      radius="2.1" radius-tubular="0.02"
      material="color: #7030ff; emissive: #5010c0; emissiveIntensity: 0.6; transparent: true; opacity: 0.35"
      animation__orbit="property: rotation; from: 0 45 60; to: 360 45 60; dur: 14000; loop: true; easing: linear"
    ></a-torus>

    <!-- Inner glow sphere ΓÇö soft violet halo -->
    <a-sphere
      radius="0.55"
      material="color: #ffffff; emissive: #d090ff; emissiveIntensity: 0.5; transparent: true; opacity: 0.15; shader: flat"
      animation__pulse="property: material.emissiveIntensity; from: 0.3; to: 1.0; dur: 3500; dir: alternate; loop: true; easing: easeInOutSine"
    ></a-sphere>

    <!-- 3D speech label ΓÇö visible in VR headset -->
    <a-text
      id="architect-speech-3d"
      value=""
      align="center"
      color="#e0b0ff"
      width="5"
      position="0 -2.2 0"
      wrap-count="36"
      font="sourcecodepro"
      animation__fade_in="property: material.opacity; from: 0; to: 1; dur: 1200; easing: easeOutCubic; startEvents: speak"
      animation__fade_out="property: material.opacity; from: 1; to: 0; dur: 1200; easing: easeInCubic; startEvents: silence"
    ></a-text>

    <!-- Label -->
    <a-text
      value="THE ARCHITECT"
      align="center"
      color="#9040ff"
      width="3.5"
      position="0 1.8 0"
      letter-spacing="4"
      font="sourcecodepro"
      material="opacity: 0.7"
    ></a-text>

  </a-entity>

  <!-- Architect violet point light -->
  <a-light
    id="architect-light"
    type="point" position="0 9 -8"
    color="#8020ff" intensity="1.8" distance="25" decay="2"
  ></a-light>

</a-scene>

<script src="mind-bridge.js"></script>
</body>
</html>
